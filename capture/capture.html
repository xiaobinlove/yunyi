<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: crosshair;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
      }

      #hint {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        color: #f3f4f6;
        background: rgba(15, 23, 42, 0.82);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        letter-spacing: 0.02em;
        backdrop-filter: blur(10px);
      }

      #selection {
        position: absolute;
        display: none;
        border: 2px solid #13be88;
        box-shadow: 0 0 0 99999px rgba(17, 24, 39, 0.45);
        z-index: 30;
      }

      #toolbar {
        position: absolute;
        display: none;
        gap: 8px;
        z-index: 40;
        background: rgba(15, 23, 42, 0.92);
        padding: 8px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      .toolbar-btn {
        border: 0;
        outline: 0;
        padding: 8px 12px;
        border-radius: 9px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      .toolbar-btn--primary {
        background: #13be88;
        color: #081c15;
      }

      .toolbar-btn--secondary {
        background: rgba(255, 255, 255, 0.12);
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <img id="background" alt="screen capture background" />
      <div id="hint">拖拽选择区域，Enter 保存，Esc 取消</div>
      <div id="selection"></div>
      <div id="toolbar">
        <button id="save-btn" class="toolbar-btn toolbar-btn--primary">保存</button>
        <button id="cancel-btn" class="toolbar-btn toolbar-btn--secondary">取消</button>
      </div>
    </div>
    <script src="./capture.js"></script>
  </body>
</html>
